name: Pull Translations from Transifex

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-translation:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        version: ['3.14']

    steps:
      # ✅ Cancel previous runs
      - uses: styfle/cancel-workflow-action@0.12.1
        with:
          access_token: ${{ secrets.GITHUB_TOKEN }}

      # ✅ Setup Python
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ✅ Install dependencies
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gettext
          python -m pip install --upgrade pip
          python -m pip install requests cogapp polib sphinx-intl blurb six transifex-client

      # 🔥 GUARANTEED tx FIX
      - name: Fix PATH for tx
        run: |
          echo "$(python -m site --user-base)/bin" >> $GITHUB_PATH

      # ✅ VERIFY tx (CRITICAL)
      - name: Verify tx installation
        run: |
          echo "PATH=$PATH"
          which tx
          tx --version

      # ✅ Checkout your repo
      - uses: actions/checkout@v4
        with:
          ref: ${{ matrix.version }}
          fetch-depth: 0

      # ✅ Download helper script
      - name: Download transifex util
        run: |
          curl -O https://raw.githubusercontent.com/python-docs-translations/transifex-automations/master/sample-workflows/transifex-util.py
          chmod +x transifex-util.py

      # ✅ Create config
      - name: Configure Transifex
        run: |
          ./transifex-util.py recreate_tx_config \
            --language ta \
            --project-slug python-newest \
            --version ${{ matrix.version }}
        env:
          TX_TOKEN: ${{ secrets.TX_TOKEN }}

      # ✅ Fetch translations
      - name: Fetch translations
        run: |
          ./transifex-util.py fetch \
            --language ta \
            --project-slug python-newest \
            --version ${{ matrix.version }}
        env:
          TX_TOKEN: ${{ secrets.TX_TOKEN }}

      # ✅ Remove obsolete files
      - name: Cleanup obsolete files
        run: |
          ./transifex-util.py delete_obsolete_files \
            --language ta \
            --project-slug python-newest \
            --version ${{ matrix.version }}

      # ✅ Setup Git
      - name: Setup Git
        run: |
          git config --local user.email "github-actions@github.com"
          git config --local user.name "Transifex Bot"

      # ✅ Detect meaningful changes
      - name: Check for changes
        run: |
          if ! git diff -I'^"POT-Creation-Date: ' \
                        -I'^"Language-Team: ' \
                        -I'^# ' \
                        -I'^"Last-Translator: ' \
                        --exit-code; then
            echo "SIGNIFICANT_CHANGES=1" >> $GITHUB_ENV
          fi

      # ✅ Commit changes
      - name: Commit changes
        if: env.SIGNIFICANT_CHANGES
        run: |
          git add . ':!transifex-util.py'
          git commit -m "Update Tamil translations from Transifex"

      # ✅ Push changes
      - uses: ad-m/github-push-action@v0.8.0
        if: env.SIGNIFICANT_CHANGES
        with:
          branch: ${{ matrix.version }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
