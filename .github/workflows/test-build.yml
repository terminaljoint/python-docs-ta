name: Test Build Workflow

on:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches:
      - '*'
  workflow_dispatch:

jobs:
  build-translation:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        version: ['3.14']
        format: [html, latex, epub]

    steps:
      # ✅ Python setup
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ✅ CPython source
      - uses: actions/checkout@v4
        with:
          repository: python/cpython
          ref: ${{ matrix.version }}

      # ✅ Build env
      - run: make venv
        working-directory: ./Doc

      # ✅ Tamil translations
      - uses: actions/checkout@v4
        with:
          repository: Terminal-Joint/python-docs-ta
          path: Doc/locales/ta/LC_MESSAGES

      # ✅ Sphinx error formatter
      - uses: sphinx-doc/github-problem-matcher@v1.1

      # ✅ CORRECT BUILD (NO -W, BUT KEEP EVERYTHING ELSE)
      - run: make -e SPHINXOPTS="--color -D language='ta' --keep-going" ${{ matrix.format }}
        working-directory: ./Doc

      # ✅ Upload output
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-${{ matrix.version }}-${{ matrix.format }}
          path: Doc/build/${{ matrix.format }}

  output-pdf:
    runs-on: ubuntu-latest
    needs: [build-translation]

    strategy:
      matrix:
        version: ['3.14']

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: build-${{ matrix.version }}-latex

      - run: sudo apt-get update
      - run: sudo apt-get install -y latexmk texlive-xetex fonts-freefont-otf xindy

      - run: make

      - uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.version }}-pdf
          path: ./*.pdf
